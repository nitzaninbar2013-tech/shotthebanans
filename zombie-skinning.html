<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Zombie Skinning Example</title>
	<style>a{color:#f00}</style>
</head>
<body>
	<div id="container"></div>
	<div id="info" style="position:fixed;left:12px;top:12px;z-index:10;background:rgba(255,255,255,0.9);padding:8px;border-radius:6px">three.js — Zombie skinning example (put your GLB at <code>models/gltf/Zombie.glb</code>)</div>

	<script type="module">
		import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
		import Stats from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/libs/stats.module.js';
		import { GUI } from 'https://cdn.jsdelivr.net/npm/lil-gui@0.18.0/dist/lil-gui.esm.min.js';
		import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

		let scene, renderer, camera, stats;
		let model, skeleton, mixer, clock;

		let idleAction, walkAction, runAction;
		let idleWeight, walkWeight, runWeight;
		let actions, settings;
		let singleStepMode = false;
		let sizeOfNextStep = 0;
		const crossFadeControls = [];

		init();

		function init(){
			const container = document.getElementById('container');

			camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 100);
			camera.position.set(1,2,-3);
			camera.lookAt(0,1,0);

			clock = new THREE.Clock();

			scene = new THREE.Scene();
			scene.background = new THREE.Color(0xa0a0a0);
			scene.fog = new THREE.Fog(0xa0a0a0,10,50);

			const hemi = new THREE.HemisphereLight(0xffffff,0x8d8d8d,3); hemi.position.set(0,20,0); scene.add(hemi);
			const dir = new THREE.DirectionalLight(0xffffff,3); dir.position.set(-3,10,-10); dir.castShadow=true; scene.add(dir);

			const ground = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshPhongMaterial({color:0xcbcbcb, depthWrite:false}));
			ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

			renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true; container.appendChild(renderer.domElement);

			stats = new Stats(); container.appendChild(stats.dom);

			const loader = new GLTFLoader();
			// put your zombie model at models/gltf/Zombie.glb (or edit path below)
			loader.load('models/gltf/Zombie.glb', (gltf)=>{
				model = gltf.scene; scene.add(model);
				model.traverse(o=>{ if(o.isMesh) o.castShadow = true; });

				skeleton = new THREE.SkeletonHelper(model); skeleton.visible = false; scene.add(skeleton);
				createPanel();

				const animations = gltf.animations || [];
				mixer = new THREE.AnimationMixer(model);

				idleAction = mixer.clipAction(animations[0] || null);
				walkAction = mixer.clipAction(animations[1] || null);
				runAction = mixer.clipAction(animations[2] || null);

				actions = [idleAction, walkAction, runAction].filter(Boolean);
				activateAllActions();
				renderer.setAnimationLoop(animate);
			}, undefined, (e)=>{ console.warn('GLTF load error', e); });

			window.addEventListener('resize', onWindowResize);
		}

		function createPanel(){
			const panel = new GUI({width:310});
			const f1 = panel.addFolder('Visibility');
			const f2 = panel.addFolder('Activation');
			const f3 = panel.addFolder('Pausing');
			const f4 = panel.addFolder('Crossfading');
			const f5 = panel.addFolder('Blend Weights');
			const f6 = panel.addFolder('Speed');

			settings = {
				'show model': true,
				'show skeleton': false,
				'activate all': activateAllActions,
				'deactivate all': deactivateAllActions,
				'pause/continue': pauseContinue,
				'modify idle weight': 1.0,
				'modify walk weight': 0.0,
				'modify run weight': 0.0,
				'modify time scale': 1.0
			};

			f1.add(settings,'show model').onChange(v=>{ if(model) model.visible = v; });
			f1.add(settings,'show skeleton').onChange(v=>{ if(skeleton) skeleton.visible = v; });
			f2.add(settings,'activate all'); f2.add(settings,'deactivate all');
			f3.add(settings,'pause/continue');
			f5.add(settings,'modify idle weight',0,1,0.01).onChange(w=>setWeight(idleAction,w));
			f5.add(settings,'modify walk weight',0,1,0.01).onChange(w=>setWeight(walkAction,w));
			f5.add(settings,'modify run weight',0,1,0.01).onChange(w=>setWeight(runAction,w));
			f6.add(settings,'modify time scale',0,2,0.01).onChange(s=>{ if(mixer) mixer.timeScale = s; });

			f1.open();f2.open();f3.open();f4.open();f5.open();f6.open();
		}

		function setWeight(action, weight){ if(!action) return; action.enabled = true; action.setEffectiveTimeScale(1); action.setEffectiveWeight(weight); }
		function deactivateAllActions(){ actions.forEach(a=>a.stop()); }
		function activateAllActions(){ actions.forEach(a=>{ a.play(); }); }
		function pauseContinue(){ actions.forEach(a=> a.paused = !a.paused); }

		function onWindowResize(){ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

		function animate(){
			const delta = singleStepMode ? sizeOfNextStep : (clock.getDelta());
			if(mixer) mixer.update(delta);
			renderer.render(scene,camera);
			stats.update();
		}

	</script>
</body>
</html>
